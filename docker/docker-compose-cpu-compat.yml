services:
  mysql:
    image: mysql:5.7
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --init-file
      /data/application/init.sql

  minio:
    image: ragflow-minio:RELEASE.2024-01-16T16-07-38Z-cpu-compat
    build:
      context: ..
      dockerfile: docker/minio-cpu-compat.Dockerfile
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/minio/health/live"]

  nats:
    healthcheck:
      disable: true
